<!-- List of Bouquets -->
<div class="recommended__elems ficb">
    {% for bouquet in bouquets %}
        <a href="{% url 'bouquets:card' bouquet.id %}" class="invisible-link">
            <div class="recommended__block {% if forloop.counter > 6 %}hidden-bouquet{% endif %}" style="background-image: url('{{ bouquet.image.url }}');">
                <div class="recommended__block_elems ficb">
                    <span class="recommended__block_intro">{{ bouquet.title }}</span>
                    <span class="recommended__block_price">{{ bouquet.price | floatformat:0 }} руб</span>
                </div>
            </div>
        </a>
    {% empty %}
        <div class="title">Букетов пока нет</div>
    {% endfor %}
</div>
